<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP-Chess</title>
    <link rel="stylesheet" href="style.css">
    <!-- <script src="/socket.io/socket.io.js"></script> -->
</head>
<body>
    <div class="button-div">
        <div class="computer-btn-div">
        <button class="game-btn" onclick="startComputerGame()">Play vs Computer</button>
        </div>

        <div class="multiplayer-btn-div">
        <input id="roomInput" placeholder="Room ID">
        <button class="game-btn" onclick="createRoom()">Create Room</button>
        <button class="game-btn" onclick="joinRoom()">Join Room</button>
        </div>

        <div class="restart-btn-div">
        <button onclick="restartGame()">Restart Game</button>
        </div>
    </div>

    <div class="timer-container">
        <div class="timer">
            <h3>White</h3>
            <span id="whiteTime">15:00</span>
        </div>

        <div class="timer">
            <h3>Black</h3>
            <span id="blackTime">15:00</span>
        </div>
    </div>

    <h2 id="status">WHITE to move</h2>
    <button id="restartBtn" style="display:none;">Restart Game</button>

    <div class="game-container">

        <div id="capturedBlack" class="captured-box"></div>

        <div id="board"></div>

        <div id="capturedWhite" class="captured-box"></div>

    </div>

</body>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="computer.js"></script>
<script src="ux.js"></script>
<script src="script.js"></script>
</html>
